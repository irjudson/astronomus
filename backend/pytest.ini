[pytest]
pythonpath = app
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
console_output_style = classic

# Test timeout (seconds) - prevents tests from hanging indefinitely
timeout = 60

# Coverage settings
addopts =
    --verbose
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=50

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    recording: marks tests that use recorded telescope sessions (requires recording file)
    playback: marks tests that use playback server
    hardware: marks tests that require a real Seestar S50 telescope (--telescope-host)
    mock: marks tests that use the minimal MockSeestarServer (always available)
    dangerous: marks tests for destructive commands that must never run on real hardware
